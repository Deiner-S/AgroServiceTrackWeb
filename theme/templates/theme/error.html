{% extends "base.html" %}

{% block content %}
<section class="page-shell pt-10">
    <div class="surface-panel max-w-2xl">
        <p class="page-kicker">Falha na operacao</p>
        <h1 class="mt-3 text-3xl font-semibold tracking-[-0.03em] text-white" style="font-family: 'Space Grotesk', sans-serif;">Erro {{ status_code }}</h1>
        <p class="mt-4 text-base leading-7 text-slate-300">{{ error_message }}</p>
    </div>
</section>
{% endblock %}
