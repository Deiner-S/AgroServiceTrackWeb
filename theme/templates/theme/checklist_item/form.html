{% extends "base.html" %}

{% block content %}
<form class="mt-4 bg-white p-8 rounded-lg shadow-md w-full max-w-2xl mx-auto text-black"
    method="POST"
    hx-post="{% url 'add_checklist_item' %}"
    hx-target="#main-content"
    hx-swap="innerHTML">
    <h1 class="text-2xl font-bold text-center mb-6">Cadastrar Item do Checklist</h1>
    {% csrf_token %}
    {{ form.non_field_errors }}

    <div class="grid grid-cols-1 gap-4">
        <div class="mb-4">
            {{ form.name.label_tag }}
            {{ form.name }}
            {{ form.name.errors }}
        </div>
    </div>

    <div class="mt-4 flex gap-2">
        <button type="submit" class="bg-gray-600 hover:bg-gray-700 text-white py-2 px-4 rounded">Salvar</button>
        <button
            type="button"
            class="bg-gray-200 hover:bg-gray-300 text-black py-2 px-4 rounded"
            hx-get="{% url 'checklist-item-list' %}"
            hx-target="#main-content"
            hx-swap="innerHTML"
        >
            Voltar
        </button>
    </div>
</form>
{% endblock %}
