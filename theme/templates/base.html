{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <title>Agro Service Track</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script>
        (() => {
            const storageKey = "ast-theme";
            const root = document.documentElement;
            const savedTheme = localStorage.getItem(storageKey);
            const preferredTheme = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
            root.dataset.theme = savedTheme === "light" || savedTheme === "dark" ? savedTheme : preferredTheme;
        })();
    </script>
    {% tailwind_css %}
    <script src="https://unpkg.com/htmx.org"></script>
</head>

<body class="leading-normal tracking-normal" style="font-family: 'IBM Plex Sans', sans-serif;">

    {% block content %}
    {% endblock %}

    <script>
        function applyCpfMask(value) {
            const digits = value.replace(/\D/g, "").slice(0, 11);

            if (digits.length <= 3) {
                return digits;
            }

            if (digits.length <= 6) {
                return `${digits.slice(0, 3)}.${digits.slice(3)}`;
            }

            if (digits.length <= 9) {
                return `${digits.slice(0, 3)}.${digits.slice(3, 6)}.${digits.slice(6)}`;
            }

            return `${digits.slice(0, 3)}.${digits.slice(3, 6)}.${digits.slice(6, 9)}-${digits.slice(9)}`;
        }

        function applyPhoneMask(value) {
            const digits = value.replace(/\D/g, "").slice(0, 11);

            if (digits.length === 0) {
                return "";
            }

            if (digits.length <= 2) {
                return `(${digits}`;
            }

            if (digits.length <= 6) {
                return `(${digits.slice(0, 2)}) ${digits.slice(2)}`;
            }

            if (digits.length <= 10) {
                return `(${digits.slice(0, 2)}) ${digits.slice(2, 6)}-${digits.slice(6)}`;
            }

            return `(${digits.slice(0, 2)}) ${digits.slice(2, 7)}-${digits.slice(7)}`;
        }

        function applyZipCodeMask(value) {
            const digits = value.replace(/\D/g, "").slice(0, 8);

            if (digits.length <= 5) {
                return digits;
            }

            return `${digits.slice(0, 5)}-${digits.slice(5)}`;
        }

        function bindCpfMask(root = document) {
            root.querySelectorAll('input[data-mask="cpf"]').forEach((input) => {
                input.value = applyCpfMask(input.value);

                if (input.dataset.maskBound === "true") {
                    return;
                }

                input.addEventListener("input", () => {
                    input.value = applyCpfMask(input.value);
                });

                input.dataset.maskBound = "true";
            });
        }

        function bindPhoneMask(root = document) {
            root.querySelectorAll('input[data-mask="phone"]').forEach((input) => {
                input.value = applyPhoneMask(input.value);

                if (input.dataset.maskBound === "true") {
                    return;
                }

                input.addEventListener("input", () => {
                    input.value = applyPhoneMask(input.value);
                });

                input.dataset.maskBound = "true";
            });
        }

        function bindZipCodeMask(root = document) {
            root.querySelectorAll('input[data-mask="zip_code"]').forEach((input) => {
                input.value = applyZipCodeMask(input.value);

                if (input.dataset.maskBound === "true") {
                    return;
                }

                input.addEventListener("input", () => {
                    input.value = applyZipCodeMask(input.value);
                });

                input.dataset.maskBound = "true";
            });
        }

        function getCurrentTheme() {
            return document.documentElement.dataset.theme === "light" ? "light" : "dark";
        }

        function applyTheme(theme) {
            const safeTheme = theme === "light" ? "light" : "dark";
            document.documentElement.dataset.theme = safeTheme;
            localStorage.setItem("ast-theme", safeTheme);
            const nextThemeLabel = safeTheme === "light" ? "Ativar modo escuro" : "Ativar modo claro";

            document.querySelectorAll("[data-theme-label]").forEach((label) => {
                label.textContent = safeTheme === "light" ? "Modo escuro" : "Modo claro";
            });

            document.querySelectorAll("[data-theme-icon]").forEach((icon) => {
                icon.textContent = safeTheme === "light" ? "Lua" : "Sol";
            });

            document.querySelectorAll("[data-theme-toggle]").forEach((button) => {
                button.setAttribute("aria-label", nextThemeLabel);
                button.setAttribute("title", nextThemeLabel);
            });
        }

        function bindThemeToggle(root = document) {
            root.querySelectorAll("[data-theme-toggle]").forEach((button) => {
                if (button.dataset.themeBound === "true") {
                    return;
                }

                button.addEventListener("click", () => {
                    applyTheme(getCurrentTheme() === "light" ? "dark" : "light");
                });

                button.dataset.themeBound = "true";
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            applyTheme(getCurrentTheme());
            bindThemeToggle();
            bindCpfMask();
            bindPhoneMask();
            bindZipCodeMask();
        });

        document.body.addEventListener("htmx:afterSwap", (event) => {
            bindThemeToggle(event.target);
            bindCpfMask(event.target);
            bindPhoneMask(event.target);
            bindZipCodeMask(event.target);
        });
    </script>
</body>
</html>
