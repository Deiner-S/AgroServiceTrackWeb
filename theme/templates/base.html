{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Agro Service Track</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    {% tailwind_css %}
    <script src="https://unpkg.com/htmx.org"></script>
</head>

<body class="bg-gray-500 text-black font-sans leading-normal tracking-normal" style="font-family: 'Inter', sans-serif;">

    {% block content %}
    {% endblock %}

    <script>
        function applyCpfMask(value) {
            const digits = value.replace(/\D/g, "").slice(0, 11);

            if (digits.length <= 3) {
                return digits;
            }

            if (digits.length <= 6) {
                return `${digits.slice(0, 3)}.${digits.slice(3)}`;
            }

            if (digits.length <= 9) {
                return `${digits.slice(0, 3)}.${digits.slice(3, 6)}.${digits.slice(6)}`;
            }

            return `${digits.slice(0, 3)}.${digits.slice(3, 6)}.${digits.slice(6, 9)}-${digits.slice(9)}`;
        }

        function applyPhoneMask(value) {
            const digits = value.replace(/\D/g, "").slice(0, 11);

            if (digits.length === 0) {
                return "";
            }

            if (digits.length <= 2) {
                return `(${digits}`;
            }

            if (digits.length <= 6) {
                return `(${digits.slice(0, 2)}) ${digits.slice(2)}`;
            }

            if (digits.length <= 10) {
                return `(${digits.slice(0, 2)}) ${digits.slice(2, 6)}-${digits.slice(6)}`;
            }

            return `(${digits.slice(0, 2)}) ${digits.slice(2, 7)}-${digits.slice(7)}`;
        }

        function bindCpfMask(root = document) {
            root.querySelectorAll('input[data-mask="cpf"]').forEach((input) => {
                input.value = applyCpfMask(input.value);

                if (input.dataset.maskBound === "true") {
                    return;
                }

                input.addEventListener("input", () => {
                    input.value = applyCpfMask(input.value);
                });

                input.dataset.maskBound = "true";
            });
        }

        function bindPhoneMask(root = document) {
            root.querySelectorAll('input[data-mask="phone"]').forEach((input) => {
                input.value = applyPhoneMask(input.value);

                if (input.dataset.maskBound === "true") {
                    return;
                }

                input.addEventListener("input", () => {
                    input.value = applyPhoneMask(input.value);
                });

                input.dataset.maskBound = "true";
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            bindCpfMask();
            bindPhoneMask();
        });

        document.body.addEventListener("htmx:afterSwap", (event) => {
            bindCpfMask(event.target);
            bindPhoneMask(event.target);
        });
    </script>
</body>
</html>
